<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a table with certain characteristics">
    <link rel="stylesheet" href="./css/table_styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">
    <title>Table build</title>
</head>
<body>
    <header>

    </header>
    <main>
        <h1>Table build activity</h1>
        <table>
            <caption>
                ACME Wildwest
            </caption>
            <thead>
                <tr>
                    <th id="title" colspan="3" scope="colgroup">ACME Wildwest</th>
                </tr>
                    
                <tr id="subtitles">
                    <th scope="col">Period</th>
                    <th scope="col">Sales</th>
                    <th scope="col">Sales Goal</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>August</td>
                    <td>$3,590</td>
                    <td>$4,000</td>
                </tr>
                <tr>
                    <td>September</td>
                    <td>$4,420</td>
                    <td>$5,000</td>
                </tr>
                <tr>
                    <td>October</td>
                    <td>$4,870</td>
                    <td>$5000</td>
                </tr>
                <tr>
                    <td>November</td>
                    <td>$8,610</td>
                    <td id="atention">$7,500</td>
                </tr>
                <tr>
                    <td id="italic">Black Friday</td>
                    <td colspan="2">$3,200</td>
                    
                </tr>
                <tr>
                    <td>December</td>
                    <td>$6,820</td>
                    <td>$7,500</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="3">Compiled by CLS</td>
                </tr>
            </tfoot>
        </table>
    </main>
    <footer>
    <p>Week 8 Cristian L Sedas
    </p>

    </footer>
</body>
</html>
